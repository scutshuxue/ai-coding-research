<!DOCTYPE html>
<html>
<head>
<style>
html { background: #181B24; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: #181B24; color: #FFFFFF;
}
.accent-bar {
  position: absolute; top: 0; left: 0; width: 8pt; height: 405pt;
  background: #B165FB;
}
.top-line {
  position: absolute; top: 0; left: 0; width: 720pt; height: 3pt;
  background: #40695B;
}
.content {
  display: flex; flex-direction: column; align-items: center;
  margin-top: 40pt;
}
h1 { font-size: 36pt; color: #B165FB; margin: 0 0 12pt 0; }
h2 { font-size: 22pt; color: #FFFFFF; font-weight: normal; margin: 0 0 30pt 0; }
.subtitle { font-size: 14pt; color: #8E9AAF; margin: 0; }
.tag-row { display: flex; gap: 12pt; margin-top: 24pt; }
.tag {
  background: #2A2D3A; padding: 6pt 16pt; border-radius: 4pt;
  border-left: 3pt solid #40695B;
}
.tag p { font-size: 11pt; color: #40695B; margin: 0; }
.bottom-info {
  position: absolute; bottom: 20pt; right: 30pt;
}
.bottom-info p { font-size: 10pt; color: #555; margin: 0; }
</style>
</head>
<body>
<div class="accent-bar"></div>
<div class="top-line"></div>
<div class="content">
  <h1>AI Agent Skills 深度解析</h1>
  <h2>Superpowers + VoltAgent 底层原理与实践</h2>
  <p class="subtitle">从 Skill 触发机制到多代理编排架构的完整技术剖析</p>
  <div class="tag-row">
    <div class="tag"><p>Skill Framework</p></div>
    <div class="tag"><p>Subagent Architecture</p></div>
    <div class="tag"><p>Prompt Engineering</p></div>
    <div class="tag"><p>Multi-Agent Orchestration</p></div>
  </div>
</div>
<div class="bottom-info"><p>2026.03 | AI Coding Workshop</p></div>
</body>
</html>
